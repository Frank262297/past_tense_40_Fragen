<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Past Tense Kahoot-Style Quiz – 40 Questions</title>
<style>
:root{
  --bg1:#46178f; --bg2:#25076b; --card:#ffffff; --text:#1f2937;
  --red:#e21b3c; --blue:#1368ce; --yellow:#d89e00; --green:#26890c;
  --purple:#7b2ff7; --orange:#ff7a00;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial, Helvetica, sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:#fff;min-height:100vh;}
.app{max-width:1000px;margin:0 auto;padding:18px;}
.header{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:12px;}
.logo{font-size:clamp(1.8rem,4vw,3rem);font-weight:900;text-shadow:0 4px 12px rgba(0,0,0,.35);}
.pill{background:rgba(255,255,255,.16);padding:10px 14px;border-radius:999px;font-weight:800;}
.card{background:var(--card);color:var(--text);border-radius:28px;padding:22px;box-shadow:0 14px 36px rgba(0,0,0,.35);min-height:560px;}
.topline{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.tag{background:#f3f4f6;border-radius:999px;padding:8px 12px;font-weight:800;color:#4b5563;}
.progressWrap{height:14px;background:#e5e7eb;border-radius:999px;overflow:hidden;flex:1;min-width:170px;}
.progress{height:100%;background:linear-gradient(90deg,#22c55e,#84cc16);width:0%;transition:.25s;}
.question{font-size:clamp(1.35rem,3vw,2.05rem);font-weight:900;line-height:1.25;margin:18px 0 18px;}
.hint{font-size:1rem;color:#6b7280;margin-top:-6px;margin-bottom:14px;}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;}
.btn{border:0;border-radius:18px;padding:18px 14px;min-height:78px;font-size:1.08rem;font-weight:900;color:white;cursor:pointer;transition:transform .1s, filter .2s, opacity .2s;text-align:center;}
.btn:hover{transform:scale(1.015);filter:brightness(1.05)}
.btn:disabled{cursor:not-allowed;opacity:.75;transform:none}
.red{background:var(--red)} .blue{background:var(--blue)} .yellow{background:var(--yellow);color:#111827} .green{background:var(--green)}
.orange{background:var(--orange)} .purple{background:var(--purple)}
.correct{outline:5px solid #22c55e!important;filter:brightness(1.12)}
.wrong{outline:5px solid #ef4444!important;filter:grayscale(.25)}
.controls{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:18px;}
.next{border:0;border-radius:16px;background:#111827;color:#fff;font-weight:900;padding:15px 28px;font-size:1.08rem;cursor:pointer;display:none;}
.smallBtn{border:0;border-radius:14px;background:#374151;color:white;font-weight:800;padding:12px 16px;cursor:pointer;}
.feedback{margin-top:15px;font-size:1.2rem;font-weight:900;min-height:32px;}
.input{width:100%;font-size:1.1rem;padding:15px;border:3px solid #e5e7eb;border-radius:16px;outline:none;margin:8px 0 10px;}
.input:focus{border-color:#7c3aed}
.wordBank,.dropZone,.matchGrid{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center;margin:12px 0;}
.word,.slot,.pairCard{border:3px solid #d1d5db;border-radius:16px;background:#f9fafb;padding:12px 16px;font-size:1.05rem;font-weight:900;min-height:52px;}
.word{cursor:grab;user-select:none}.word:active{cursor:grabbing}.word.used{opacity:.35;pointer-events:none}.slot{min-width:105px;background:#eef2ff}.slot.over{border-color:#7c3aed;background:#ede9fe}.slot.filled{background:#dcfce7;border-color:#22c55e}
.matchGrid{display:grid;grid-template-columns:1fr 1fr;align-items:stretch}.colTitle{font-weight:900;color:#6b7280;text-align:center;margin:6px 0}.matchOption{border:3px solid #e5e7eb;background:#f9fafb;border-radius:16px;padding:14px;cursor:pointer;font-weight:900}.matchOption.selected{border-color:#7c3aed;background:#ede9fe}.matchOption.done{background:#dcfce7;border-color:#22c55e;cursor:default}.matchOption.bad{background:#fee2e2;border-color:#ef4444}
.story{background:#f8fafc;border:2px dashed #cbd5e1;border-radius:18px;padding:16px;line-height:1.55;font-size:1.08rem;text-align:left}.verbToken{display:inline-block;margin:3px;padding:4px 8px;border-radius:8px;background:#e0f2fe;cursor:pointer;font-weight:900}.verbToken.selected{background:#22c55e;color:white}.verbToken.missed{background:#fde68a}.verbToken.wrongToken{background:#fecaca}.lieCard{border:3px solid #e5e7eb;border-radius:18px;padding:14px;margin:10px 0;text-align:left;font-weight:900;cursor:pointer}.lieCard:hover{background:#f3f4f6}.lieCard.chosen{border-color:#7c3aed;background:#ede9fe}.final{font-size:1.7rem;text-align:center}.resultBox{background:#f8fafc;border-radius:22px;padding:22px;margin-top:18px}.emoji{font-size:3rem}.kbd{font-family:monospace;background:#e5e7eb;border-radius:6px;padding:2px 6px}.footerNote{color:#d1d5db;text-align:center;font-size:.95rem;margin-top:10px}
@media(max-width:700px){.grid{grid-template-columns:1fr}.card{padding:16px;border-radius:22px}.matchGrid{grid-template-columns:1fr}.btn{min-height:68px}.question{font-size:1.35rem}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">🎮 Past Tense Arena</div>
    <div class="pill" id="scorePill">Score: 0</div>
    <div class="pill" id="qPill">Question 1 / 40</div>
  </div>
  <div class="card">
    <div class="topline">
      <div class="tag" id="typeTag">Multiple Choice</div>
      <div class="progressWrap"><div class="progress" id="progress"></div></div>
    </div>
    <div class="question" id="question"></div>
    <div class="hint" id="hint"></div>
    <div id="activity"></div>
    <div class="feedback" id="feedback"></div>
    <div class="controls">
      <button class="next" id="nextBtn" onclick="nextQuestion()">Next ➜</button>
      <button class="smallBtn" id="restartBtn" style="display:none" onclick="restartQuiz()">Restart</button>
    </div>
  </div>
  <div class="footerNote">Tablet-friendly HTML quiz · Kahoot-style · Past Simple / Present Perfect / regular & irregular verbs</div>
</div>
<script>
const colors=['red','blue','yellow','green'];
let current=0, score=0, locked=false;
let matchState={left:null,right:null,pairsFound:0};
function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}
const quiz=[
{type:'mc',tag:'Multiple Choice',q:'Which sentence is correct?',a:['Yesterday I goed to school.','Yesterday I went to school.','Yesterday I go to school.','Yesterday I was go to school.'],c:1,ex:'After yesterday we use the Past Simple: went.'},
{type:'order',tag:'Reihenfolge ordnen',q:'Put the words into the correct order.',words:['yesterday','football','played','I'],answer:'I played football yesterday',hint:'Click the words in the right order.'},
{type:'write',tag:'Selber schreiben',q:'Write the Past Simple form of SEE.',answer:['saw']},
{type:'error',tag:'Fehler finden',q:'Find the mistake in the sentence:',sentence:'She buyed a new phone last week.',answer:['buyed'],ex:'The correct form is bought.'},
{type:'tf',tag:'Wahr oder falsch',q:'Is this sentence correct? “Did you watched the film?”',answer:false,ex:'After did we use the infinitive: Did you watch ...?'},
{type:'match',tag:'Satzteile verbinden',q:'Match the sentence beginnings with the correct endings.',left:['I visited','She didn’t','Did they','We went'],right:['Berlin last year.','watch TV yesterday.','play tennis?','to Spain in July.'],pairs:[[0,0],[1,1],[2,2],[3,3]]},
{type:'detective',tag:'Zeitdetektiv 🔍',q:'Choose the correct tense: “I have lived here for three years.”',a:['Past Simple','Present Perfect','Future','Present Continuous'],c:1,ex:'for three years often connects past and present → Present Perfect.'},
{type:'drag',tag:'Drag & Drop',q:'Drag the correct verb into the gap: “Last night, we ___ a scary film.”',words:['saw','seen','see','seeing'],answer:'saw'},
{type:'dialog',tag:'Dialog ergänzen',q:'Complete the dialogue:<br>A: What did you do yesterday?<br>B: I ______ my grandparents.',answer:['visited']},
{type:'spot',tag:'Spot the tense',q:'Click all Past Simple verbs in the mini-story.',text:'Yesterday I woke up late, missed the bus and walked to school. My teacher smiled.',answers:['woke','missed','walked','smiled']},
{type:'lie',tag:'Two truths and one lie',q:'Which sentence is grammatically wrong?',items:['I ate breakfast at 8 o’clock.','She didn’t went home.','They played basketball yesterday.'],answer:1,ex:'After didn’t we use the infinitive: go.'},
{type:'transform',tag:'Satz umbauen',q:'Make this sentence negative:<br><b>He played computer games yesterday.</b>',answer:['he did not play computer games yesterday','he didn’t play computer games yesterday','he didnt play computer games yesterday']},
{type:'mc',tag:'Regular or irregular?',q:'Which verb is irregular in the Past Simple?',a:['played','wanted','went','cleaned'],c:2},
{type:'order',tag:'Reihenfolge ordnen',q:'Put the words into a question.',words:['you','did','last weekend','go','where'],answer:'where did you go last weekend'},
{type:'write',tag:'Selber schreiben',q:'Write the Past Simple form of TAKE.',answer:['took']},
{type:'error',tag:'Fehler finden',q:'Find the mistake in the sentence:',sentence:'They didn’t went to London.',answer:['went'],ex:'Correct: They didn’t go to London.'},
{type:'tf',tag:'Wahr oder falsch',q:'Is this rule correct? After DID / DIDN’T, the main verb is in the infinitive.',answer:true},
{type:'match',tag:'Satzteile verbinden',q:'Match the infinitive with the Past Simple form.',left:['go','eat','write','make'],right:['ate','made','went','wrote'],pairs:[[0,2],[1,0],[2,3],[3,1]]},
{type:'detective',tag:'Zeitdetektiv 🔍',q:'Choose the correct tense: “I lost my keys yesterday.”',a:['Present Perfect','Past Simple','Present Simple','Past Perfect'],c:1,ex:'yesterday → Past Simple.'},
{type:'drag',tag:'Drag & Drop',q:'Drag the correct verb into the gap: “She ___ her homework after dinner.”',words:['did','done','do','does'],answer:'did'},
{type:'dialog',tag:'Dialog ergänzen',q:'Complete the dialogue:<br>A: Did Tom call you?<br>B: No, he ______.',answer:['didn’t','didnt','did not']},
{type:'spot',tag:'Spot the tense',q:'Click all Past Simple verbs.',text:'On Monday, Lisa bought a ticket, took the train and arrived in London.',answers:['bought','took','arrived']},
{type:'lie',tag:'Two truths and one lie',q:'Which sentence is grammatically wrong?',items:['Did they finish the project?','We saw a fox last night.','I didn’t watched the video.'],answer:2,ex:'Correct: I didn’t watch the video.'},
{type:'transform',tag:'Satz umbauen',q:'Turn this into a question:<br><b>You saw the new teacher.</b>',answer:['did you see the new teacher','did you see the new teacher?']},
{type:'mc',tag:'Multiple Choice',q:'Choose the correct Past Simple form of BEGIN.',a:['beginned','began','begun','begin'],c:1},
{type:'order',tag:'Reihenfolge ordnen',q:'Put the words into the correct order.',words:['last night','a funny video','watched','we'],answer:'we watched a funny video last night'},
{type:'write',tag:'Selber schreiben',q:'Complete: Last summer we ______ to Italy. (go)',answer:['went']},
{type:'error',tag:'Fehler finden',q:'Find the mistake in the sentence:',sentence:'We was very tired after the match.',answer:['was'],ex:'Correct: We were very tired.'},
{type:'tf',tag:'Wahr oder falsch',q:'Is this sentence correct? “She didn’t buy anything.”',answer:true},
{type:'match',tag:'Satzteile verbinden',q:'Match each time expression with the best tense.',left:['yesterday','already','last year','ever'],right:['Present Perfect','Past Simple','Present Perfect','Past Simple'],pairs:[[0,1],[1,0],[2,3],[3,2]]},
{type:'detective',tag:'Zeitdetektiv 🔍',q:'Choose the correct tense: “Have you ever been to London?”',a:['Past Simple','Present Perfect','Present Simple','Past Continuous'],c:1,ex:'ever is a common signal word for Present Perfect.'},
{type:'drag',tag:'Drag & Drop',q:'Drag the correct ending: “Yesterday, I want___ to stay at home.”',words:['ed','','ing','s'],answer:'ed'},
{type:'dialog',tag:'Dialog ergänzen',q:'Complete the dialogue:<br>A: Where did you go?<br>B: I ______ to the cinema.',answer:['went']},
{type:'spot',tag:'Spot the tense',q:'Click all Past Simple verbs.',text:'The children ran outside, found a ball and started a game.',answers:['ran','found','started']},
{type:'lie',tag:'Two truths and one lie',q:'Which sentence is grammatically wrong?',items:['He made a cake yesterday.','They were at home.','She goed to school by bus.'],answer:2,ex:'Correct: She went to school by bus.'},
{type:'transform',tag:'Satz umbauen',q:'Make this sentence negative:<br><b>They were happy.</b>',answer:['they were not happy','they weren’t happy','they werent happy']},
{type:'mc',tag:'Regular or irregular?',q:'Which Past Simple form is regular?',a:['bought','came','visited','saw'],c:2},
{type:'order',tag:'Reihenfolge ordnen',q:'Put the words into the correct negative sentence.',words:['didn’t','I','the answer','know'],answer:'I didn’t know the answer'},
{type:'write',tag:'Selber schreiben',q:'Write one correct Past Simple sentence with the word “party”.',sample:true,min:12},
{type:'detective',tag:'Finale 🔍',q:'Choose the best sentence.',a:['I have seen him yesterday.','I saw him yesterday.','I see him yesterday.','I did saw him yesterday.'],c:1,ex:'With yesterday use Past Simple: I saw him yesterday.'}
];
const elQ=document.getElementById('question'), elHint=document.getElementById('hint'), elAct=document.getElementById('activity'), elFeed=document.getElementById('feedback'), nextBtn=document.getElementById('nextBtn'), scorePill=document.getElementById('scorePill'), qPill=document.getElementById('qPill'), typeTag=document.getElementById('typeTag'), progress=document.getElementById('progress'), restartBtn=document.getElementById('restartBtn');
function norm(s){return String(s).toLowerCase().trim().replace(/[.!?]/g,'').replace(/’/g,"'").replace(/\s+/g,' ')}
function updateHeader(){scorePill.textContent='Score: '+score; qPill.textContent='Question '+Math.min(current+1,quiz.length)+' / '+quiz.length; progress.style.width=(current/quiz.length*100)+'%';}
function show(){locked=false; elFeed.innerHTML=''; nextBtn.style.display='none'; elAct.innerHTML=''; updateHeader(); let q=quiz[current]; typeTag.textContent=q.tag; elQ.innerHTML=(current+1)+'. '+q.q; elHint.textContent=q.hint||'';
 if(q.type==='mc'||q.type==='detective') renderMC(q);
 if(q.type==='tf') renderTF(q);
 if(q.type==='write'||q.type==='dialog'||q.type==='error'||q.type==='transform') renderInput(q);
 if(q.type==='order') renderOrder(q);
 if(q.type==='drag') renderDrag(q);
 if(q.type==='match') renderMatch(q);
 if(q.type==='spot') renderSpot(q);
 if(q.type==='lie') renderLie(q);
}
function renderMC(q){let html='<div class="grid">'; q.a.forEach((x,i)=>html+=`<button class="btn ${colors[i%4]}" onclick="choose(${i})">${x}</button>`); html+='</div>'; elAct.innerHTML=html;}
function renderTF(q){elAct.innerHTML=`<div class="grid"><button class="btn green" onclick="chooseTF(true)">True ✅</button><button class="btn red" onclick="chooseTF(false)">False ❌</button></div>`}
function renderInput(q){let extra=q.sentence?`<div class="story"><b>${q.sentence}</b></div>`:''; let ph=q.type==='error'?'Type only the wrong word':(q.sample?'Write your own sentence':'Your answer'); elAct.innerHTML=`${extra}<input class="input" id="textAnswer" placeholder="${ph}"><button class="btn green" onclick="checkInput()">Submit</button>`;}
function renderOrder(q){const words=shuffle(q.words); elAct.innerHTML=`<div class="wordBank" id="bank">${words.map(w=>`<button class="word" onclick="addWord(this)">${w}</button>`).join('')}</div><div class="dropZone" id="sentence"></div><button class="smallBtn" onclick="resetOrder()">Reset</button> <button class="btn green" style="min-height:52px" onclick="checkOrder()">Check</button>`;}
function addWord(btn){const s=document.getElementById('sentence'); const span=document.createElement('span'); span.className='word'; span.textContent=btn.textContent; span.onclick=()=>{btn.classList.remove('used');span.remove()}; s.appendChild(span); btn.classList.add('used');}
function resetOrder(){document.querySelectorAll('.word.used').forEach(w=>w.classList.remove('used')); document.getElementById('sentence').innerHTML='';}
function renderDrag(q){elAct.innerHTML=`<div class="wordBank">${shuffle(q.words).map(w=>`<span class="word" draggable="true" ondragstart="dragStart(event)">${w}</span>`).join('')}</div><div class="dropZone"><div class="slot" id="drop" ondragover="dragOver(event)" ondrop="dropWord(event)">Drop here</div></div><button class="btn green" style="min-height:52px" onclick="checkDrag()">Check</button>`;}
function dragStart(e){e.dataTransfer.setData('text/plain',e.target.textContent)}
function dragOver(e){e.preventDefault();}
function dropWord(e){e.preventDefault(); e.currentTarget.textContent=e.dataTransfer.getData('text/plain'); e.currentTarget.classList.add('filled');}
function renderMatch(q){matchState={left:null,right:null,pairsFound:0,done:[]}; const left=q.left.map((x,i)=>`<div class="matchOption" id="L${i}" onclick="pickMatch('L',${i})">${x}</div>`).join(''); const right=q.right.map((x,i)=>`<div class="matchOption" id="R${i}" onclick="pickMatch('R',${i})">${x}</div>`).join(''); elAct.innerHTML=`<div class="matchGrid"><div><div class="colTitle">Beginning</div>${left}</div><div><div class="colTitle">Ending</div>${right}</div></div>`;}
function pickMatch(side,i){let q=quiz[current]; const id=side+i; const elem=document.getElementById(id); if(elem.classList.contains('done')) return; document.querySelectorAll('.matchOption').forEach(x=>x.classList.remove('selected','bad')); elem.classList.add('selected'); matchState[side==='L'?'left':'right']=i; if(matchState.left!==null && matchState.right!==null){let ok=q.pairs.some(p=>p[0]===matchState.left&&p[1]===matchState.right); if(ok){document.getElementById('L'+matchState.left).classList.add('done'); document.getElementById('R'+matchState.right).classList.add('done'); matchState.pairsFound++; matchState.left=null;matchState.right=null; if(matchState.pairsFound===q.pairs.length) finish(true,'✅ All pairs matched!');}else{document.getElementById('L'+matchState.left).classList.add('bad'); document.getElementById('R'+matchState.right).classList.add('bad'); matchState.left=null;matchState.right=null;}}
}
function renderSpot(q){const words=q.text.split(/(\s+)/).map(tok=>{let clean=tok.replace(/[^A-Za-z]/g,''); return clean?`<span class="verbToken" data-word="${clean.toLowerCase()}" onclick="toggleToken(this)">${tok}</span>`:tok}).join(''); elAct.innerHTML=`<div class="story">${words}</div><button class="btn green" style="min-height:52px;margin-top:14px" onclick="checkSpot()">Check selected verbs</button>`;}
function toggleToken(e){e.classList.toggle('selected')}
function renderLie(q){elAct.innerHTML=q.items.map((it,i)=>`<div class="lieCard" onclick="chooseLie(${i},this)">${it}</div>`).join('');}
function choose(i){if(locked)return; let q=quiz[current]; let buttons=document.querySelectorAll('.btn'); buttons.forEach(b=>b.disabled=true); if(i===q.c){buttons[i].classList.add('correct'); finish(true,'✅ Correct! '+(q.ex||''));}else{buttons[i].classList.add('wrong'); buttons[q.c].classList.add('correct'); finish(false,'❌ Not quite. '+(q.ex||''));}}
function chooseTF(val){if(locked)return; const ok=val===quiz[current].answer; document.querySelectorAll('.btn').forEach(b=>b.disabled=true); finish(ok, ok?'✅ Correct!':'❌ Not quite. '+(quiz[current].ex||''));}
function checkInput(){if(locked)return; let q=quiz[current]; let val=norm(document.getElementById('textAnswer').value); let ok=q.sample?val.length>=(q.min||8):q.answer.map(norm).includes(val); finish(ok, ok?'✅ Correct!':`❌ Correct answer: <b>${q.answer[0]}</b> ${(q.ex||'')}`);}
function checkOrder(){if(locked)return; let val=Array.from(document.querySelectorAll('#sentence .word')).map(x=>x.textContent).join(' '); let ok=norm(val)===norm(quiz[current].answer); finish(ok, ok?'✅ Perfect order!':`❌ Correct: <b>${quiz[current].answer}</b>`);}
function checkDrag(){if(locked)return; let val=document.getElementById('drop').textContent; let ok=norm(val)===norm(quiz[current].answer); finish(ok, ok?'✅ Correct!':`❌ Correct answer: <b>${quiz[current].answer}</b>`);}
function checkSpot(){if(locked)return; let q=quiz[current], ans=q.answers.map(norm); let selected=Array.from(document.querySelectorAll('.verbToken.selected')).map(x=>norm(x.dataset.word)); let ok=ans.length===selected.length && ans.every(a=>selected.includes(a)); document.querySelectorAll('.verbToken').forEach(t=>{let w=norm(t.dataset.word); if(ans.includes(w)&&!t.classList.contains('selected')) t.classList.add('missed'); if(!ans.includes(w)&&t.classList.contains('selected')) t.classList.add('wrongToken');}); finish(ok, ok?'✅ You found all Past Simple verbs!':`❌ Past verbs: <b>${q.answers.join(', ')}</b>`);}
function chooseLie(i,el){if(locked)return; document.querySelectorAll('.lieCard').forEach(x=>x.classList.remove('chosen')); el.classList.add('chosen'); let ok=i===quiz[current].answer; finish(ok, ok?'✅ Correct — that is the lie.':'❌ Not that one. '+(quiz[current].ex||''));}
function finish(ok,msg){locked=true;if(ok){score++;} elFeed.innerHTML=msg; scorePill.textContent='Score: '+score; nextBtn.style.display='inline-block';}
function nextQuestion(){current++; if(current<quiz.length) show(); else end();}
function end(){progress.style.width='100%'; typeTag.textContent='Finished'; elQ.innerHTML='🏆 Quiz finished!'; elHint.textContent=''; elAct.innerHTML=`<div class="final"><div class="emoji">🎉</div><div class="resultBox">You scored <b>${score}</b> out of <b>${quiz.length}</b>.<br>${score>=34?'🔥 Excellent!':score>=26?'👏 Good job!':'💪 Keep practising!'}</div></div>`; elFeed.innerHTML=''; nextBtn.style.display='none'; restartBtn.style.display='inline-block'; qPill.textContent='Finished';}
function restartQuiz(){current=0;score=0;restartBtn.style.display='none';show();}
show();
</script>
</body>
</html>
